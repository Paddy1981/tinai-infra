# k8s/billing-chain.yaml
# Deploys all 4 billing chain services to the `billing` namespace.
# Prerequisites: namespace `billing` exists (created by metering-bridge manifest).
# Secret `billing-chain-secrets` must be created manually first — see README.

---
# ── Shared ConfigMap ──────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-chain-config
  namespace: billing
data:
  LAGO_API_URL: "http://lago-api.billing.svc.cluster.local:3000"
  NATS_SERVERS: "nats://nats.core.svc.cluster.local:4222"
  SMTP_HOST: "stalwart.core.svc.cluster.local"
  SMTP_PORT: "587"
  EMAIL_FROM: "billing@tinai.cloud"
  EMAIL_FROM_NAME: "Tinai Billing"
  TENANT_NS_PREFIX: "tenant-"
  GST_HSN_CODE: "998313"
  GST_RATE: "0.18"
  COMPANY_LEGAL_NAME: "Larun Engineering LLP"
  LOG_LEVEL: "info"
  NODE_ENV: "production"

---
# ── 1. Invoice Generator (Deployment — always-on webhook receiver) ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoice-generator
  namespace: billing
  labels:
    app: invoice-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invoice-generator
  template:
    metadata:
      labels:
        app: invoice-generator
    spec:
      serviceAccountName: billing-chain
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: invoice-generator
          image: harbor.tinai.cloud/tinai/billing-chain:latest
          command: ["node", "invoice-generator/src/index.js"]
          ports:
            - containerPort: 3101
          env:
            - name: PORT
              value: "3101"
          envFrom:
            - configMapRef:
                name: billing-chain-config
            - secretRef:
                name: billing-chain-secrets
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 3101 }
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: invoice-generator
  namespace: billing
spec:
  selector:
    app: invoice-generator
  ports:
    - port: 3101
      targetPort: 3101

---
# ── 2. Payment Webhook Handler (Deployment — always-on, receives Razorpay/Stripe) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-webhook
  namespace: billing
  labels:
    app: payment-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-webhook
  template:
    metadata:
      labels:
        app: payment-webhook
    spec:
      serviceAccountName: billing-chain
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: payment-webhook
          image: harbor.tinai.cloud/tinai/billing-chain:latest
          command: ["node", "payment-webhook/src/index.js"]
          ports:
            - containerPort: 3102
          env:
            - name: PORT
              value: "3102"
          envFrom:
            - configMapRef:
                name: billing-chain-config
            - secretRef:
                name: billing-chain-secrets
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 3102 }
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: payment-webhook
  namespace: billing
spec:
  selector:
    app: payment-webhook
  ports:
    - port: 3102
      targetPort: 3102

---
# ── 3. Trial Lifecycle (CronJob — runs every 6 hours) ────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: trial-lifecycle
  namespace: billing
spec:
  schedule: "0 */6 * * *"   # every 6 hours
  concurrencyPolicy: Forbid  # never run 2 instances simultaneously
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800  # 30 min max
      template:
        spec:
          serviceAccountName: billing-chain
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
          containers:
            - name: trial-lifecycle
              image: harbor.tinai.cloud/tinai/billing-chain:latest
              command: ["node", "trial-lifecycle/src/index.js"]
              envFrom:
                - configMapRef:
                    name: billing-chain-config
                - secretRef:
                    name: billing-chain-secrets
              resources:
                requests: { cpu: "50m", memory: "64Mi" }
                limits: { cpu: "200m", memory: "256Mi" }

---
# ── 4. Plan Handler (Deployment — always-on, serves Control Plane API calls) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plan-handler
  namespace: billing
  labels:
    app: plan-handler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plan-handler
  template:
    metadata:
      labels:
        app: plan-handler
    spec:
      serviceAccountName: billing-chain
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: plan-handler
          image: harbor.tinai.cloud/tinai/billing-chain:latest
          command: ["node", "plan-handler/src/index.js"]
          ports:
            - containerPort: 3103
          env:
            - name: PORT
              value: "3103"
          envFrom:
            - configMapRef:
                name: billing-chain-config
            - secretRef:
                name: billing-chain-secrets
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 3103 }
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: plan-handler
  namespace: billing
spec:
  selector:
    app: plan-handler
  ports:
    - port: 3103
      targetPort: 3103

---
# ── RBAC — billing-chain ServiceAccount ──────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: billing-chain
  namespace: billing
automountServiceAccountToken: true  # needs K8s API for namespace ops

---
# ClusterRole: billing-chain needs to read/patch tenant namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: billing-chain
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "list", "create", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: billing-chain
subjects:
  - kind: ServiceAccount
    name: billing-chain
    namespace: billing
roleRef:
  kind: ClusterRole
  name: billing-chain
  apiGroup: rbac.authorization.k8s.io

---
# ── Ingress — expose webhooks publicly via Traefik ────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: billing-webhooks
  namespace: billing
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: ["api.tinai.cloud"]
      secretName: tinai-api-tls
  rules:
    - host: api.tinai.cloud
      http:
        paths:
          - path: /webhooks/lago
            pathType: Prefix
            backend:
              service: { name: invoice-generator, port: { number: 3101 } }
          - path: /webhooks/razorpay
            pathType: Prefix
            backend:
              service: { name: payment-webhook, port: { number: 3102 } }
          - path: /webhooks/stripe
            pathType: Prefix
            backend:
              service: { name: payment-webhook, port: { number: 3102 } }
          - path: /internal/plan-change
            pathType: Prefix
            backend:
              service: { name: plan-handler, port: { number: 3103 } }
          - path: /plans
            pathType: Prefix
            backend:
              service: { name: plan-handler, port: { number: 3103 } }
