apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinai-realtime
  namespace: tinai-system
  labels:
    app: tinai-realtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tinai-realtime
  template:
    metadata:
      labels:
        app: tinai-realtime
    spec:
      imagePullSecrets:
        - name: e2e-registry-secret
      containers:
        - name: realtime
          image: registry.e2enetworks.net/tinai/tinai-realtime:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3003
              protocol: TCP
          env:
            - name: PORT
              value: "3003"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: database-url
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tinai-realtime
  namespace: tinai-system
  labels:
    app: tinai-realtime
spec:
  type: ClusterIP
  selector:
    app: tinai-realtime
  ports:
    - name: http
      port: 3003
      targetPort: 3003
      protocol: TCP
