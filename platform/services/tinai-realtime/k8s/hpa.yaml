apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tinai-realtime
  namespace: tinai-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tinai-realtime
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
