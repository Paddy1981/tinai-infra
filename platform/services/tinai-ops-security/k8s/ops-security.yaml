# k8s/ops-security.yaml
# All operations and security services.

---
apiVersion: v1
kind: Namespace
metadata:
  name: ops

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ops-config
  namespace: ops
data:
  PROMETHEUS_URL:   "http://prometheus-server.monitoring.svc.cluster.local:9090"
  NATS_SERVERS:     "nats://nats.nats.svc.cluster.local:4222"
  SMTP_HOST:        "stalwart.core.svc.cluster.local"
  SMTP_PORT:        "587"
  EMAIL_FROM:       "ops@tinai.cloud"
  EMAIL_FROM_NAME:  "Tinai Ops"
  HARBOR_URL:       "https://harbor.tinai.cloud"
  HARBOR_USER:      "admin"
  GITEA_URL:        "https://gitea.tinai.cloud"
  GITEA_ORG:        "tinai-tenants"
  VAULT_ADDR:       "http://vault.vault.svc.cluster.local:8200"
  TENANT_NS_PREFIX: "tenant-"
  BUILD_NAMESPACE:  "build-system"
  BUILDER_IMAGE:    "harbor.tinai.cloud/tinai/nixpacks-builder:latest"
  ROLLOUT_TIMEOUT_MS: "300000"
  MONITOR_DURATION_MS: "300000"
  POLL_INTERVAL_MS: "300000"
  DLQ_ALERT_THRESHOLD: "10"
  EGRESS_SPIKE_MULTIPLIER: "5"
  AUTO_QUARANTINE:  "false"
  BLOCK_ON_CRITICAL: "true"
  LOG_LEVEL:        "info"
  NODE_ENV:         "production"

---
# ── 1. Namespace Provisioner (Deployment) ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: namespace-provisioner
  namespace: ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: namespace-provisioner
  template:
    metadata:
      labels:
        app: namespace-provisioner
    spec:
      serviceAccountName: ops
      securityContext: { runAsNonRoot: true, runAsUser: 1001 }
      containers:
        - name: namespace-provisioner
          image: harbor.tinai.cloud/tinai/ops:latest
          command: ["node", "namespace-provisioner/src/index.js"]
          ports: [{ containerPort: 3400 }]
          env: [{ name: PORT, value: "3400" }]
          envFrom:
            - configMapRef: { name: ops-config }
            - secretRef:    { name: ops-secrets }
          resources:
            requests: { cpu: "50m",  memory: "64Mi"  }
            limits:   { cpu: "200m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 3400 }
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata: { name: namespace-provisioner, namespace: ops }
spec:
  selector: { app: namespace-provisioner }
  ports: [{ port: 3400, targetPort: 3400 }]

---
# ── 2. Build & Deploy Controller (Deployment) ─────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: build-deploy
  namespace: ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: build-deploy
  template:
    metadata:
      labels:
        app: build-deploy
    spec:
      serviceAccountName: ops
      securityContext: { runAsNonRoot: true, runAsUser: 1001 }
      containers:
        - name: build-deploy
          image: harbor.tinai.cloud/tinai/ops:latest
          command: ["node", "build-deploy/src/index.js"]
          ports: [{ containerPort: 3401 }]
          env: [{ name: PORT, value: "3401" }]
          envFrom:
            - configMapRef: { name: ops-config }
            - secretRef:    { name: ops-secrets }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 3401 }
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata: { name: build-deploy, namespace: ops }
spec:
  selector: { app: build-deploy }
  ports: [{ port: 3401, targetPort: 3401 }]

---
