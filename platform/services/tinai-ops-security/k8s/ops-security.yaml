---
# ── Security: CVE Scanner (CronJob weekly) ────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata: { name: cve-scanner, namespace: ops }
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ops
          restartPolicy: OnFailure
          containers:
            - name: cve-scanner
              image: harbor.tinai.cloud/tinai/ops:latest
              command: ["node", "security/cve-scanner/index.js"]
              envFrom:
                - configMapRef: { name: ops-config }
                - secretRef:    { name: ops-secrets }
              resources:
                requests: { cpu: "200m", memory: "256Mi" }
                limits:   { cpu: "1000m", memory: "512Mi" }

---
# ── Security: Network Policy Enforcer (CronJob daily) ────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata: { name: network-policy-enforcer, namespace: ops }
spec:
  schedule: "30 5 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ops
          restartPolicy: OnFailure
          containers:
            - name: network-policy
              image: harbor.tinai.cloud/tinai/ops:latest
              command: ["node", "security/network-policy/index.js"]
              envFrom:
                - configMapRef: { name: ops-config }
                - secretRef:    { name: ops-secrets }
              resources:
                requests: { cpu: "50m", memory: "64Mi" }
                limits:   { cpu: "200m", memory: "128Mi" }

---
# ── Security: Egress Anomaly Monitor (Deployment — always-on) ─────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress-anomaly
  namespace: ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: egress-anomaly
  template:
    metadata:
      labels:
        app: egress-anomaly
    spec:
      serviceAccountName: ops
      securityContext: { runAsNonRoot: true, runAsUser: 1001 }
      containers:
        - name: egress-anomaly
          image: harbor.tinai.cloud/tinai/ops:latest
          command: ["node", "security/egress-anomaly/index.js"]
          ports: [{ containerPort: 3500 }]
          env: [{ name: PORT, value: "3500" }]
          envFrom:
            - configMapRef: { name: ops-config }
            - secretRef:    { name: ops-secrets }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 3500 }
            periodSeconds: 60

---
# ── Security: Audit Log Export (CronJob daily) ────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata: { name: audit-log-export, namespace: ops }
spec:
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ops
          restartPolicy: OnFailure
          volumes:
            - name: audit-logs
              hostPath: { path: /var/log/kubernetes }
          containers:
            - name: audit-export
              image: harbor.tinai.cloud/tinai/ops:latest
              command: ["node", "security/audit-log-export/index.js"]
              env:
                - { name: RUN_MODE,            value: audit-export }
                - { name: K8S_AUDIT_LOG_PATH,  value: /var/log/kubernetes/audit.log }
              envFrom:
                - configMapRef: { name: ops-config }
                - secretRef:    { name: ops-secrets }
              volumeMounts:
                - name: audit-logs
                  mountPath: /var/log/kubernetes
                  readOnly: true
              resources:
                requests: { cpu: "50m", memory: "128Mi" }
                limits:   { cpu: "200m", memory: "256Mi" }

---
# ── Ingress ────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ops-api
  namespace: ops
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: ["api.tinai.cloud"]
      secretName: tinai-api-tls
  rules:
    - host: api.tinai.cloud
      http:
        paths:
          - { path: /provision,          pathType: Prefix, backend: { service: { name: namespace-provisioner, port: { number: 3400 } } } }
          - { path: /webhooks/gitea,     pathType: Prefix, backend: { service: { name: build-deploy,          port: { number: 3401 } } } }
          - { path: /webhook/alertmanager, pathType: Prefix, backend: { service: { name: incident-alerting,   port: { number: 3402 } } } }
          - { path: /dlq,                pathType: Prefix, backend: { service: { name: dlq-monitor,           port: { number: 3403 } } } }
          - { path: /rollback,           pathType: Prefix, backend: { service: { name: rollback-controller,   port: { number: 3405 } } } }
          - { path: /scaling,            pathType: Prefix, backend: { service: { name: hpa-scaler,            port: { number: 3404 } } } }

---
# ── RBAC ──────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata: { name: ops, namespace: ops }
automountServiceAccountToken: true

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: ops }
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "configmaps", "serviceaccounts", "persistentvolumeclaims", "limitranges", "resourcequotas"]
    verbs: ["get", "list", "create", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "create", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "create", "patch", "update"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "patch", "update"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "create", "patch", "update"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: ops }
subjects:
  - { kind: ServiceAccount, name: ops, namespace: ops }
roleRef:
  kind: ClusterRole
  name: ops
  apiGroup: rbac.authorization.k8s.io
