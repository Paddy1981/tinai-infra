          ports: [{ containerPort: 3405 }]
          env: [{ name: PORT, value: "3405" }]
          envFrom:
            - configMapRef: { name: ops-config }
            - secretRef:    { name: ops-secrets }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
