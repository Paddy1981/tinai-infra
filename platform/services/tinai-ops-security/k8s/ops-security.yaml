---
# ── 4. HPA Scaler (Deployment + daily reconcile CronJob) ──────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-scaler
  namespace: ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpa-scaler
  template:
    metadata:
      labels:
        app: hpa-scaler
    spec:
      serviceAccountName: ops
      securityContext: { runAsNonRoot: true, runAsUser: 1001 }
      containers:
        - name: hpa-scaler
          image: harbor.tinai.cloud/tinai/ops:latest
          command: ["node", "hpa-scaler/src/index.js"]
          ports: [{ containerPort: 3404 }]
          env: [{ name: PORT, value: "3404" }]
          envFrom:
            - configMapRef: { name: ops-config }
            - secretRef:    { name: ops-secrets }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 3404 }
            periodSeconds: 30

---
apiVersion: batch/v1
kind: CronJob
metadata: { name: hpa-reconcile, namespace: ops }
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ops
          restartPolicy: OnFailure
          containers:
            - name: hpa-reconcile
              image: harbor.tinai.cloud/tinai/ops:latest
              command: ["node", "hpa-scaler/src/index.js"]
              env: [{ name: RUN_MODE, value: reconcile }]
              envFrom:
                - configMapRef: { name: ops-config }
                - secretRef:    { name: ops-secrets }
              resources:
                requests: { cpu: "50m", memory: "64Mi" }
                limits:   { cpu: "200m", memory: "128Mi" }

---
