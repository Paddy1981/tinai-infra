version: "3.9"

# Tinai Guard — Central Server Stack
# Deploy on Hetzner CX32 or equivalent (4 vCPU, 8GB RAM)
# Domain: guard.tinai.cloud

services:

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://guard:${POSTGRES_PASSWORD}@postgres:5432/guard
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HEADSCALE_URL: http://headscale:8080
      HEADSCALE_API_KEY: ${HEADSCALE_API_KEY}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      ENVIRONMENT: production
    depends_on: [postgres, redis, minio]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`guard.tinai.cloud`) && PathPrefix(`/api`, `/webhooks`, `/health`)"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  workers:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://guard:${POSTGRES_PASSWORD}@postgres:5432/guard
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on: [postgres, redis, minio]

  beat:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    command: celery -A app.workers.tasks.celery_app beat --loglevel=info
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://guard:${POSTGRES_PASSWORD}@postgres:5432/guard
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on: [postgres, redis]

  headscale:
    image: headscale/headscale:latest
    restart: unless-stopped
    command: serve
    volumes:
      - ../headscale/config.yaml:/etc/headscale/config.yaml
      - /data/headscale:/var/lib/headscale
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hs.rule=Host(`hs.tinai.cloud`)"
      - "traefik.http.routers.hs.tls.certresolver=le"
      - "traefik.http.services.hs.loadbalancer.server.port=8080"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: guard
      POSTGRES_USER: guard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /data/redis:/data
    command: redis-server --save 60 1

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - /data/minio:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`storage.tinai.cloud`)"
      - "traefik.http.routers.minio.tls.certresolver=le"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"

  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /data/letsencrypt:/letsencrypt
