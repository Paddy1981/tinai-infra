apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinai-api
  namespace: tinai-system
  labels:
    app: tinai-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinai-api
  template:
    metadata:
      labels:
        app: tinai-api
    spec:
      serviceAccountName: tinai-deploy-sa
      imagePullSecrets:
        - name: e2e-registry-secret
      containers:
        - name: tinai-api
          image: registry.e2enetworks.net/tinai/tinai-api:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: database-url
            - name: STAGING_NAMESPACE
              value: "tinai-staging"
            - name: BUILD_NAMESPACE
              value: "tinai-build"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: anthropic-api-key
                  optional: true
            - name: PG_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: pg-admin-pass
                  optional: true
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: minio-root-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: jwt-secret
          envFrom:
            - configMapRef:
                name: tinai-region-config
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
