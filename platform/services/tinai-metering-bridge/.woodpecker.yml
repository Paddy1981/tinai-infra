# .woodpecker.yml
# Tinai Metering Bridge — CI/CD pipeline
# Runs on: push to main, PRs, tags (vX.Y.Z)

when:
  - event: [push, pull_request, tag]

steps:
  # ── 1. Install & lint ───────────────────────────────────────────────────────
  - name: install
    image: node:20-alpine
    commands:
      - npm ci
    when:
      - event: [push, pull_request]

  # ── 2. Run tests ────────────────────────────────────────────────────────────
  - name: test
    image: node:20-alpine
    commands:
      - npm test
    when:
      - event: [push, pull_request]

  # ── 3. Build & push Docker image to Harbor ──────────────────────────────────
  - name: docker-build-push
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: harbor.tinai.cloud
      repo: harbor.tinai.cloud/tinai/metering-bridge
      username:
        from_secret: harbor_username
      password:
        from_secret: harbor_password
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      platforms:
        - linux/amd64
        - linux/arm64   # For Mac Mini M4 Pro node
    when:
      - event: push
        branch: main

  # ── 4. Tag release image ────────────────────────────────────────────────────
  - name: docker-tag-release
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: harbor.tinai.cloud
      repo: harbor.tinai.cloud/tinai/metering-bridge
      username:
        from_secret: harbor_username
      password:
        from_secret: harbor_password
      tags:
        - ${CI_COMMIT_TAG}
        - latest
    when:
      - event: tag

  # ── 5. Trivy security scan ──────────────────────────────────────────────────
  - name: trivy-scan
    image: aquasecurity/trivy:latest
    commands:
      - trivy image --exit-code 1 --severity CRITICAL harbor.tinai.cloud/tinai/metering-bridge:${CI_COMMIT_SHA:0:8}
    when:
      - event: push
        branch: main

  # ── 6. Deploy to K3s via Argo CD ────────────────────────────────────────────
  - name: argocd-sync
    image: argoproj/argocd:latest
    environment:
      ARGOCD_SERVER: argocd.tinai.cloud
      ARGOCD_AUTH_TOKEN:
        from_secret: argocd_auth_token
    commands:
      - argocd app sync metering-bridge --server $ARGOCD_SERVER --auth-token $ARGOCD_AUTH_TOKEN
      - argocd app wait metering-bridge --server $ARGOCD_SERVER --auth-token $ARGOCD_AUTH_TOKEN --health
    when:
      - event: push
        branch: main
