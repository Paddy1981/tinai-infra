apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: usage-aggregator-db
  namespace: tinai-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: usage-aggregator-db
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/tinai/usage-aggregator
        property: database_url
