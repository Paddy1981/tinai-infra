---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tinai-instances-sa
  namespace: tinai-system
  labels:
    tinai.cloud/managed-by: tinai-instances

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tinai-instances-provisioner
  labels:
    tinai.cloud/managed-by: tinai-instances
rules:
  # Pod lifecycle management in the tinai-instances namespace
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # PVC management (workspace volumes)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "create", "delete"]
  # Service management (SSH / Jupyter ingress)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "create", "delete"]
  # Namespace read (ensure tinai-instances exists)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tinai-instances-provisioner
  labels:
    tinai.cloud/managed-by: tinai-instances
subjects:
  - kind: ServiceAccount
    name: tinai-instances-sa
    namespace: tinai-system
roleRef:
  kind: ClusterRole
  name: tinai-instances-provisioner
  apiGroup: rbac.authorization.k8s.io
