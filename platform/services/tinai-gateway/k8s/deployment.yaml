---
# ── Deployment ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinai-gateway
  namespace: tinai-system
  labels:
    app: tinai-gateway
    app.kubernetes.io/name: tinai-gateway
    app.kubernetes.io/component: ai-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tinai-gateway
  template:
    metadata:
      labels:
        app: tinai-gateway
        app.kubernetes.io/name: tinai-gateway
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: tinai-gateway
          image: ghcr.io/tinai/tinai-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3005
              protocol: TCP
          env:
            - name: PORT
              value: "3005"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-gateway-secrets
                  key: ANTHROPIC_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-gateway-secrets
                  key: GEMINI_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tinai-gateway-secrets
                  key: DATABASE_URL
            - name: OLLAMA_BASE_URL
              value: "http://ollama.tinai-system.svc.cluster.local:11434"
            - name: SARVAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-gateway-secrets
                  key: sarvam-api-key
                  optional: true
            - name: KRUTRIM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-gateway-secrets
                  key: krutrim-api-key
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      securityContext:
        runAsNonRoot: true

---
# ── Service (ClusterIP) ──────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: tinai-gateway
  namespace: tinai-system
  labels:
    app: tinai-gateway
spec:
  type: ClusterIP
  selector:
    app: tinai-gateway
  ports:
    - name: http
      port: 3005
      targetPort: http
      protocol: TCP

---
# ── HorizontalPodAutoscaler ──────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tinai-gateway
  namespace: tinai-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tinai-gateway
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min cooldown before scaling in
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
