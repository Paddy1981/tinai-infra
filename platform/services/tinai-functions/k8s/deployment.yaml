apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinai-functions
  namespace: tinai-system
  labels:
    app: tinai-functions
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tinai-functions
  template:
    metadata:
      labels:
        app: tinai-functions
    spec:
      serviceAccountName: tinai-functions
      imagePullSecrets:
        - name: e2e-registry-secret
      containers:
        - name: tinai-functions
          image: registry.e2enetworks.net/tinai/tinai-functions:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3004
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: jwt-secret
            - name: MINIO_ENDPOINT
              value: "minio.tinai-system.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: rootUser
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: rootPassword
            - name: KNATIVE_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: tinai-functions
  namespace: tinai-system
  labels:
    app: tinai-functions
spec:
  type: ClusterIP
  selector:
    app: tinai-functions
  ports:
    - name: http
      port: 3004
      targetPort: 3004
      protocol: TCP
