apiVersion: v1
kind: ServiceAccount
metadata:
  name: tinai-functions
  namespace: tinai-system
  labels:
    app: tinai-functions
---
# ClusterRole granting the service permission to manage Jobs, Pods,
# Namespaces, and ConfigMaps inside namespaces matching tinai-fn-*.
# Namespace-scoped resources (Jobs, Pods, ConfigMaps) are granted via a
# ClusterRole so the binding can cover dynamically created tenant namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tinai-functions-runner
  labels:
    app: tinai-functions
rules:
  # Manage tenant namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  # Create and watch Kubernetes Jobs for function execution
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Read Pod status and stream logs; delete completed Pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Manage ConfigMaps that carry injected function code
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tinai-functions-runner
  labels:
    app: tinai-functions
subjects:
  - kind: ServiceAccount
    name: tinai-functions
    namespace: tinai-system
roleRef:
  kind: ClusterRole
  name: tinai-functions-runner
  apiGroup: rbac.authorization.k8s.io
