when:
  - event: [push, pull_request]
    branch: [main, master]

steps:
  test:
    image: golang:1.22-alpine
    commands:
      - go test ./...
      - go vet ./...

  build-push:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      registry: registry.e2enetworks.net
      repo: registry.e2enetworks.net/tinai/auth
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
      platforms:
        - linux/amd64
      cache_from: "registry.e2enetworks.net/tinai/auth:latest"
    when:
      event: push
      branch: [main, master]
    depends_on: [test]

