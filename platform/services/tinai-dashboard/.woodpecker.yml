when:
  - event: push
    branch: [main, master]

steps:
  build-push:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: registry.e2enetworks.net
      repo: registry.e2enetworks.net/tinai/dashboard
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
      platforms:
        - linux/amd64
