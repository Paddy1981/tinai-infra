apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinai-dashboard
  namespace: tinai-system
  labels:
    tinai.cloud/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      tinai.cloud/component: dashboard
  template:
    metadata:
      labels:
        tinai.cloud/component: dashboard
    spec:
      containers:
        - name: tinai-dashboard
          image: registry.tinai.cloud/tinai-admin/tinai-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: API_URL
              value: "http://tinai-api.tinai-system.svc.cluster.local:3001"
            - name: NEXT_PUBLIC_API_URL
              value: "http://tinai-api.tinai-system.svc.cluster.local:3001"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: BUILD_API_URL
              value: "http://build-api.tinai-system.svc.cluster.local:8080"
            - name: BUILD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: build-api-secrets
                  key: internal-token
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: tinai-dashboard
  namespace: tinai-system
spec:
  selector:
    tinai.cloud/component: dashboard
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tinai-dashboard
  namespace: tinai-system
spec:
  ingressClassName: traefik
  rules:
    - host: tinai.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tinai-dashboard
                port:
                  number: 3000
