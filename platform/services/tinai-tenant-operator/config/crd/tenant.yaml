apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.tinai.cloud
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: tinai.cloud
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    singular: tenant
    shortNames:
      - tn
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Plan
          type: string
          jsonPath: .spec.plan
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Namespace
          type: string
          jsonPath: .status.namespaceName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: Tenant represents a tinai.cloud customer with an isolated namespace and quotas.
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - displayName
                - owner
              properties:
                displayName:
                  type: string
                  minLength: 1
                  maxLength: 64
                owner:
                  type: string
                  format: email
                plan:
                  type: string
                  enum: [free, starter, pro, enterprise]
                  default: free
                networkIsolation:
                  type: boolean
                  default: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Provisioning, Active, Suspended, Terminating]
                namespaceName:
                  type: string
                resourceQuotaName:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", Unknown]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
