global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'tinai-auth'
    metrics_path: /metrics
    static_configs:
      - targets: ['tinai-auth:3002']

  - job_name: 'tinai-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['tinai-api:3001']

  - job_name: 'tinai-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['tinai-gateway:3005']

  - job_name: 'tinai-forge'
    metrics_path: /metrics
    static_configs:
      - targets: ['tinai-forge:8090']
