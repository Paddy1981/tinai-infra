global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email-notifications'
  routes:
    - match:
        severity: critical
      receiver: 'email-notifications'
      repeat_interval: 1h

receivers:
  - name: 'email-notifications'
    email_configs:
      - to: 'padmanaban@laruneng.com'
        from: 'alerts@tinai.cloud'
        smarthost: 'mail-server:587'
        auth_username: 'alerts@tinai.cloud'
        auth_password: ''  # TODO: set from env/secret (e.g. ALERTMANAGER_EMAIL_PASSWORD)
        require_tls: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
