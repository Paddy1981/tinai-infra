# Template: Knative Service for a tenant function
# Variables: ${TENANT_NS}, ${FN_NAME}, ${IMAGE_TAG}
# Created by tinai-functions runner when KNATIVE_ENABLED=true
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${FN_NAME}
  namespace: ${TENANT_NS}
  labels:
    tinai.cloud/managed-by: tinai-functions
    tinai.cloud/function: ${FN_NAME}
  annotations:
    autoscaling.knative.dev/min-scale: "0"
    autoscaling.knative.dev/max-scale: "5"
    autoscaling.knative.dev/target: "10"       # target 10 concurrent requests per replica
spec:
  template:
    metadata:
      annotations:
        # Default autoscaler class annotations (applied by tinai-functions runner).
        # For io-class functions: metric=concurrency, target=100, retention=2m, initial-scale=1
        # For cpu-class functions: metric=cpu, target=70, retention=30s, initial-scale=1
        autoscaling.knative.dev/class: "kpa.autoscaling.knative.dev"
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/target: "50"
        autoscaling.knative.dev/scale-to-zero-pod-retention-period: "1m"
        autoscaling.knative.dev/initial-scale: "0"
    spec:
      containerConcurrency: 10
      timeoutSeconds: 60
      containers:
        - image: ${IMAGE_TAG}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          env:
            - name: TINAI_TENANT
              value: ${TENANT_NS}
