# ServiceAccount used by the tinai-api Deployment.
# The usage metering cron job uses the mounted SA token to call the k8s API
# and list pods labelled with tinai.cloud/tenant-id in tinai-system.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tinai-api
  namespace: tinai-system
---
# ClusterRole: read-only access to pods cluster-wide.
# Although the metering job only queries tinai-system, a ClusterRole is used
# so that the same SA can be reused for cross-namespace pod discovery without
# additional bindings should the namespace topology change.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tinai-api-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
# ClusterRoleBinding: bind the SA to the pod-reader role.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tinai-api-pod-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tinai-api-pod-reader
subjects:
  - kind: ServiceAccount
    name: tinai-api
    namespace: tinai-system
