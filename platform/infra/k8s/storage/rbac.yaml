apiVersion: v1
kind: ServiceAccount
metadata:
  name: tinai-storage-provisioner-sa
  namespace: tinai-storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tinai-storage-provisioner-role
rules:
  - apiGroups:
      - postgresql.cnpg.io
    resources:
      - clusters
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tinai-storage-provisioner-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tinai-storage-provisioner-role
subjects:
  - kind: ServiceAccount
    name: tinai-storage-provisioner-sa
    namespace: tinai-storage
