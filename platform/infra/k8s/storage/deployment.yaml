apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinai-storage-provisioner
  namespace: tinai-storage
  labels:
    app: tinai-storage-provisioner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinai-storage-provisioner
  template:
    metadata:
      labels:
        app: tinai-storage-provisioner
    spec:
      serviceAccountName: tinai-storage-provisioner-sa
      imagePullSecrets:
        - name: e2e-registry-secret
      containers:
        - name: storage-provisioner
          image: registry.e2enetworks.net/tinai/storage-provisioner:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: storage-provisioner-secrets
                  key: DATABASE_URL
            - name: MINIO_URL
              valueFrom:
                secretKeyRef:
                  name: storage-provisioner-secrets
                  key: MINIO_URL
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: storage-provisioner-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: storage-provisioner-secrets
                  key: MINIO_SECRET_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
