apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: storage-provisioner-secrets
  namespace: tinai-storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: storage-provisioner-secrets
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/tinai/storage-provisioner
        property: database_url
    - secretKey: MINIO_URL
      remoteRef:
        key: secret/tinai/minio
        property: endpoint
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: secret/tinai/minio
        property: access_key
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: secret/tinai/minio
        property: secret_key
