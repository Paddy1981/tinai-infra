auth:
  enabled: true
  existingSecret: "redis-credentials"
  existingSecretPasswordKey: "redis-password"

master:
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

replica:
  replicaCount: 0
