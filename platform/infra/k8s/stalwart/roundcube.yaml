apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: core
  labels:
    app: roundcube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:latest-apache
          ports:
            - name: http
              containerPort: 80
              hostPort: 8888
          env:
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "ssl://stalwart.core.svc.cluster.local"
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: "tls://stalwart.core.svc.cluster.local"
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "587"
            - name: ROUNDCUBEMAIL_SKIN
              value: "elastic"
            - name: ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE
              value: "25M"
          volumeMounts:
            - name: custom-config
              mountPath: /var/www/html/config/config.inc.php
              subPath: config.inc.php
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: custom-config
          configMap:
            name: roundcube-config
---
apiVersion: v1
kind: Service
metadata:
  name: roundcube
  namespace: core
spec:
  selector:
    app: roundcube
  ports:
    - name: http
      port: 80
      targetPort: 80
