# ExternalSecret: pulls MinIO backup credentials from Vault and creates
# the pg-backup-minio-creds Secret consumed by all CloudNativePG Cluster manifests.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pg-backup-minio-creds
  namespace: tinai-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: pg-backup-minio-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: secret/tinai/minio
        property: pg_backup_access_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: secret/tinai/minio
        property: pg_backup_secret_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
