# Template: per-tenant CloudNativePG Cluster
# Rendered by the Tenant Operator (or provision-tenant.sh until then).
# Variables: ${TENANT_NS}, ${TENANT_NAME}, ${STORAGE_SIZE}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${TENANT_NAME}-postgres
  namespace: ${TENANT_NS}
spec:
  instances: 1    # single-instance for tenant DBs (upgrade to 2 for enterprise)
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: ${STORAGE_SIZE:-5Gi}
    storageClass: local-path
  bootstrap:
    initdb:
      database: ${TENANT_NAME}
      owner: ${TENANT_NAME}
      secret:
        name: ${TENANT_NAME}-db-credentials
  backup:
    barmanObjectStore:
      destinationPath: s3://tinai-pg-backup-in/${TENANT_NS}/
      endpointURL: https://minio.tinai.cloud
      s3Credentials:
        accessKeyId:
          name: pg-backup-minio-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-backup-minio-creds
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
    retentionPolicy: "30d"
  monitoring:
    enablePodMonitor: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 2Gi
