# Per-tenant MongoDB 7 template
# Replace TENANT_NAME with the actual tenant identifier before applying.
# Usage: sed 's/TENANT_NAME/acme/g' mongodb-tenant.yaml | kubectl apply -f -

---
apiVersion: v1
kind: Namespace
metadata:
  name: tinai-tenant-TENANT_NAME
  labels:
    tinai.cloud/tenant: TENANT_NAME
    tinai.cloud/component: database

---
# Secret template — populate all values with base64-encoded strings
# before applying (e.g. echo -n 'strongpassword' | base64)
apiVersion: v1
kind: Secret
metadata:
  name: mongo-TENANT_NAME-secret
  namespace: tinai-tenant-TENANT_NAME
type: Opaque
data:
  # REPLACE each value: echo -n '<value>' | base64
  MONGO_INITDB_ROOT_USERNAME: MONGO_ROOT_USERNAME_B64
  MONGO_INITDB_ROOT_PASSWORD: MONGO_ROOT_PASSWORD_B64

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-TENANT_NAME
  namespace: tinai-tenant-TENANT_NAME
  labels:
    app: mongo-TENANT_NAME
    tinai.cloud/tenant: TENANT_NAME
    tinai.cloud/component: database
spec:
  serviceName: mongo-TENANT_NAME-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: mongo-TENANT_NAME
  template:
    metadata:
      labels:
        app: mongo-TENANT_NAME
        tinai.cloud/tenant: TENANT_NAME
        tinai.cloud/component: database
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-TENANT_NAME-secret
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-TENANT_NAME-secret
                  key: MONGO_INITDB_ROOT_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
                - --quiet
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
                - --quiet
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi

---
# Headless Service for stable pod DNS (required by StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: mongo-TENANT_NAME-headless
  namespace: tinai-tenant-TENANT_NAME
  labels:
    app: mongo-TENANT_NAME
    tinai.cloud/tenant: TENANT_NAME
    tinai.cloud/component: database
spec:
  clusterIP: None
  selector:
    app: mongo-TENANT_NAME
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
      protocol: TCP

---
# ClusterIP Service for app connectivity
apiVersion: v1
kind: Service
metadata:
  name: mongo-TENANT_NAME
  namespace: tinai-tenant-TENANT_NAME
  labels:
    app: mongo-TENANT_NAME
    tinai.cloud/tenant: TENANT_NAME
    tinai.cloud/component: database
spec:
  type: ClusterIP
  selector:
    app: mongo-TENANT_NAME
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
      protocol: TCP
