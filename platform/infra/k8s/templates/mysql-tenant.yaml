# Per-tenant MySQL 8 template
# Replace TENANT_NAME with the actual tenant identifier before applying.
# Usage: sed 's/TENANT_NAME/acme/g' mysql-tenant.yaml | kubectl apply -f -

---
apiVersion: v1
kind: Namespace
metadata:
  name: tinai-tenant-TENANT_NAME
  labels:
    tinai.cloud/tenant: TENANT_NAME
    tinai.cloud/component: database

---
# Secret template — populate all values with base64-encoded strings
# before applying (e.g. echo -n 'strongpassword' | base64)
apiVersion: v1
kind: Secret
metadata:
  name: mysql-TENANT_NAME-secret
  namespace: tinai-tenant-TENANT_NAME
type: Opaque
data:
  # REPLACE each value: echo -n '<value>' | base64
  MYSQL_DATABASE: MYSQL_DATABASE_B64
  MYSQL_USER: MYSQL_USER_B64
  MYSQL_PASSWORD: MYSQL_PASSWORD_B64
  MYSQL_ROOT_PASSWORD: MYSQL_ROOT_PASSWORD_B64

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-TENANT_NAME
  namespace: tinai-tenant-TENANT_NAME
  labels:
    app: mysql-TENANT_NAME
    tinai.cloud/tenant: TENANT_NAME
    tinai.cloud/component: database
spec:
  serviceName: mysql-TENANT_NAME-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: mysql-TENANT_NAME
  template:
    metadata:
      labels:
        app: mysql-TENANT_NAME
        tinai.cloud/tenant: TENANT_NAME
        tinai.cloud/component: database
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-TENANT_NAME-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-TENANT_NAME-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-TENANT_NAME-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-TENANT_NAME-secret
                  key: MYSQL_ROOT_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -u root -p"$MYSQL_ROOT_PASSWORD" --silent
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -u root -p"$MYSQL_ROOT_PASSWORD" --silent
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi

---
# Headless Service for stable pod DNS (required by StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: mysql-TENANT_NAME-headless
  namespace: tinai-tenant-TENANT_NAME
  labels:
    app: mysql-TENANT_NAME
    tinai.cloud/tenant: TENANT_NAME
    tinai.cloud/component: database
spec:
  clusterIP: None
  selector:
    app: mysql-TENANT_NAME
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP

---
# ClusterIP Service for app connectivity
apiVersion: v1
kind: Service
metadata:
  name: mysql-TENANT_NAME
  namespace: tinai-tenant-TENANT_NAME
  labels:
    app: mysql-TENANT_NAME
    tinai.cloud/tenant: TENANT_NAME
    tinai.cloud/component: database
spec:
  type: ClusterIP
  selector:
    app: mysql-TENANT_NAME
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
