# ── tinai-system: allow egress to internal cluster services ─────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-tcp
  namespace: tinai-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 443    # internal HTTPS
        - protocol: TCP
          port: 6443   # K8s API server real port (CNI sees post-DNAT 10.10.0.6:6443)
        - protocol: TCP
          port: 5432   # postgres
        - protocol: TCP
          port: 4222   # nats
        - protocol: TCP
          port: 9000   # minio
        - protocol: TCP
          port: 8200   # vault
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 8080
