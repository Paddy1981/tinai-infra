# NetworkPolicy manifests for Tinai Cloud namespace isolation.
# Apply order: namespaces.yaml → network-policies.yaml
# kubectl apply -f network-policies.yaml
#
# Design:
#   - Default deny-all ingress + egress for tinai-staging and tinai-prod
#   - Intra-namespace pod-to-pod communication is always allowed
#   - tinai-system is permitted to reach staging/prod on port 8080
#   - All namespaces can reach kube-dns (port 53 UDP + TCP)
#   - tinai-build gets external egress for git clone (Forgejo) + kaniko registry push
#   - tinai-system gets external egress for Fastify → Anthropic API + Celestrak TLE feeds
# NOTE: TKS CNI evaluates NetworkPolicy post-DNAT. The kubernetes Service (10.96.0.1:443)
#       is DNAT'd to 10.10.0.6:6443, so allow-internal-tcp must include port 6443.

# ── tinai-staging: default deny all ──────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tinai-staging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

