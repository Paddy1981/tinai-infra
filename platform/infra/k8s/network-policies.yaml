# ── tinai-system: allow CNPG operator to poll instance status (port 8000) ────
# The CNPG operator (cnpg-system) calls each instance's /status HTTP endpoint
# on port 8000. Without this, the Cluster phase stays "Instance Status
# Extraction Error: HTTP communication issue".
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-operator
  namespace: tinai-system
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: tinai-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000

# ── tinai-system: allow tinai-instances to reach postgres ────────────────────
---
apiVersion: networking.k8s.io/v1
