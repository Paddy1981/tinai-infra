apiVersion: v1
kind: ServiceAccount
metadata:
  name: tinai-forge
  namespace: tinai-forge
---
# ClusterRole for cross-namespace access to tinai-build and tinai-forge-test
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tinai-forge-operator
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tinai-forge-operator
subjects:
  - kind: ServiceAccount
    name: tinai-forge
    namespace: tinai-forge
roleRef:
  kind: ClusterRole
  name: tinai-forge-operator
  apiGroup: rbac.authorization.k8s.io
