# Forge secrets — DO NOT commit real values to Git.
# Actual secrets are managed via Vault + ExternalSecrets.
# This file is a template only.
apiVersion: v1
kind: Secret
metadata:
  name: tinai-forge-config
  namespace: tinai-forge
type: Opaque
stringData:
  # Populate via: kubectl create secret generic tinai-forge-config -n tinai-forge --from-literal=FORGE_DB_URL=... --from-literal=FORGE_API_KEY=...
  # Or use ExternalSecret synced from Vault path secret/tinai/forge
  FORGE_DB_URL: "REPLACE_VIA_VAULT"
  FORGE_GITHUB_TOKEN: ""
  FORGE_API_KEY: "REPLACE_VIA_VAULT"
  registry-username: "REPLACE_VIA_VAULT"
  registry-password: "REPLACE_VIA_VAULT"
---
# Docker registry secret for Kaniko to push images
# Populate via: kubectl create secret docker-registry tinai-registry-credentials -n tinai-forge --docker-server=... --docker-username=... --docker-password=...
apiVersion: v1
kind: Secret
metadata:
  name: tinai-registry-credentials
  namespace: tinai-forge
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: '{"auths":{}}'
