apiVersion: v1
kind: Service
metadata:
  name: tinai-forge
  namespace: tinai-forge
  labels:
    app: tinai-forge
spec:
  selector:
    app: tinai-forge
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  type: ClusterIP
---
# Internal service for dashboard to reach forge API
apiVersion: v1
kind: Service
metadata:
  name: tinai-forge-internal
  namespace: tinai-system
  labels:
    app: tinai-forge-proxy
spec:
  type: ExternalName
  externalName: tinai-forge.tinai-forge.svc.cluster.local
  ports:
    - port: 8090
