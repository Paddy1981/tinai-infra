# TinAI Platform — Consolidated External Secrets
# This file defines how secrets are synchronized from Vault to Kubernetes.
# All secretKey names MUST match the environment variable names expected by the services.

---
# tinai-auth secrets
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tinai-auth-secrets
  namespace: tinai-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: tinai-auth-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/tinai/auth
        property: database_url
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/tinai/auth
        property: jwt_secret
    - secretKey: REDIS_URL
      remoteRef:
        key: secret/tinai/redis
        property: redis_url
    - secretKey: SMTP_PASS
      remoteRef:
        key: secret/tinai/auth
        property: smtp_pass

