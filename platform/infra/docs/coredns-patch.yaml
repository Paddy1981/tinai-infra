# CoreDNS ConfigMap patch — adds hosts override so tinai.cloud domains
# resolve to ingress-nginx ClusterIP (10.104.3.63) inside the cluster.
# This fixes hairpin NAT: cert-manager ACME self-checks would otherwise
# time out trying to reach the external LB IP from within the cluster.
#
# Apply: kubectl patch configmap coredns -n kube-system --patch-file coredns-patch.yaml
# then:  kubectl rollout restart deployment coredns -n kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        hosts {
           10.104.3.63 tinai.cloud
           10.104.3.63 app.tinai.cloud
           10.104.3.63 api.tinai.cloud
           10.104.3.63 gateway.tinai.cloud
           fallthrough
        }
        prometheus :9153
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
