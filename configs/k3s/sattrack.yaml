---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sattrack
  namespace: tinai-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sattrack
  template:
    metadata:
      labels:
        app: sattrack
    spec:
      nodeSelector:
        tinai.cloud/role: stateful
      containers:
        - name: sattrack
          image: docker.io/tinai/sattrack:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              hostPort: 3050
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sattrack
  namespace: tinai-apps
spec:
  selector:
    app: sattrack
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sattrack
  namespace: tinai-apps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: sattrack.laruneng.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sattrack
                port:
                  number: 80
