---
apiVersion: batch/v1
kind: CronJob
metadata:
  annotations:
  name: cert-renewal
  namespace: maintenance
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          containers:
          - command:
            - node
            - cert-renewal/index.js
            envFrom:
            - configMapRef:
                name: maintenance-config
            - secretRef:
                name: maintenance-secrets
            image: docker.io/tinai/maintenance:v3
            imagePullPolicy: Never
            name: cert-renewal
            resources:
              limits:
                cpu: 200m
                memory: 128Mi
              requests:
                cpu: 50m
                memory: 64Mi
          restartPolicy: OnFailure
          serviceAccount: maintenance
          serviceAccountName: maintenance
  schedule: 0 5 * * *
  successfulJobsHistoryLimit: 3
  suspend: false
