# tinai-forge
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinai-forge
  namespace: tinai-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinai-forge
  template:
    metadata:
      labels:
        app: tinai-forge
    spec:
      nodeSelector:
        tinai.cloud/role: stateful
      containers:
        - name: tinai-forge
          image: docker.io/tinai/forge:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
              hostPort: 8090
          env:
            - name: API_PORT
              value: "8090"
            - name: FORGE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: tinai-db-credentials
                  key: FORGE_DB_URL
            - name: FORGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: FORGE_API_KEY
            - name: FORGE_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: FORGE_GITHUB_TOKEN
            - name: TINAI_API_URL
              value: http://tinai-api.tinai-system.svc.cluster.local:3001
            - name: REGISTRY_HOST
              value: registry.e2enetworks.net
            - name: REGISTRY_PROJECT
              value: tinai
            - name: CHECK_INTERVAL_HOURS
              value: "6"
            - name: AUTO_BUILD_PATCH
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tinai-forge
  namespace: tinai-system
spec:
  selector:
    app: tinai-forge
  ports:
    - port: 8090
      targetPort: 8090
---
# tinai-api (Node.js - heavier, prefer ryzen-node)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinai-api
  namespace: tinai-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinai-api
  template:
    metadata:
      labels:
        app: tinai-api
    spec:
      nodeSelector:
        tinai.cloud/role: stateful
      containers:
        - name: tinai-api
          image: docker.io/tinai/api:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
              hostPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tinai-db-credentials
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              value: redis://redis.tinai-system.svc.cluster.local:6379
            - name: API_URL
              value: http://tinai-api.tinai-system.svc.cluster.local:3001
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: ANTHROPIC_API_KEY
            - name: FORGEJO_URL
              value: http://forgejo.tinai-system.svc.cluster.local:3000
            - name: FORGEJO_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: FORGEJO_ADMIN_TOKEN
            - name: FORGEJO_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: FORGEJO_WEBHOOK_SECRET
            - name: FORGE_API_URL
              value: http://tinai-forge.tinai-system.svc.cluster.local:8090
            - name: FORGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: FORGE_API_KEY
            - name: POSTMARK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: POSTMARK_API_KEY
            - name: MINIO_ENDPOINT
              value: minio.tinai-system.svc.cluster.local:9000
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: tinai-minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tinai-minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BUCKET
              value: tinai-codegen
            - name: MINIO_USE_SSL
              value: "false"
            - name: STAGING_NAMESPACE
              value: local
            - name: BUILD_NAMESPACE
              value: local
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tinai-api
  namespace: tinai-system
spec:
  selector:
    app: tinai-api
  ports:
    - port: 3001
      targetPort: 3001
