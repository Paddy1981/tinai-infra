---
# tinai-auth
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinai-auth
  namespace: tinai-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinai-auth
  template:
    metadata:
      labels:
        app: tinai-auth
    spec:
      nodeSelector:
        tinai.cloud/role: stateful
      containers:
        - name: tinai-auth
          image: docker.io/tinai/auth:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
              hostPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tinai-db-credentials
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tinai-api-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              value: redis://redis.tinai-system.svc.cluster.local:6379
            - name: API_URL
              value: http://tinai-api.tinai-system.svc.cluster.local:3001
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tinai-auth
  namespace: tinai-system
spec:
  selector:
    app: tinai-auth
  ports:
    - port: 3002
      targetPort: 3002
