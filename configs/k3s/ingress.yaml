---
# Dashboard: tinai.cloud, app.tinai.cloud
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tinai-dashboard
  namespace: tinai-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: tinai.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tinai-dashboard
                port:
                  number: 3000
    - host: app.tinai.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tinai-dashboard
                port:
                  number: 3000
---
