---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safety-forge
  namespace: tinai-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: safety-forge
  template:
    metadata:
      labels:
        app: safety-forge
    spec:
      nodeSelector:
        tinai.cloud/role: stateful
      containers:
        - name: safety-forge
          image: docker.io/tinai/safety-forge:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              hostPort: 3040
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tinai-app-secrets
                  key: DATABASE_URL_SAFETYFORGE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tinai-app-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: tinai-app-secrets
                  key: JWT_REFRESH_SECRET
            - name: DB_SSL
              value: "false"
            - name: MINIO_ENDPOINT
              value: "http://minio.tinai-system.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tinai-minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: VITE_API_URL
              value: https://safetyforge.laruneng.com
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: safety-forge
  namespace: tinai-apps
spec:
  selector:
    app: safety-forge
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safety-forge
  namespace: tinai-apps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: safetyforge.laruneng.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: safety-forge
                port:
                  number: 3000
