---
# Coll - Collaboration Platform
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coll
  namespace: tinai-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coll
  template:
    metadata:
      labels:
        app: coll
    spec:
      nodeSelector:
        tinai.cloud/role: stateful
      containers:
        - name: coll
          image: docker.io/tinai/coll:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              hostPort: 3070
          env:
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: coll
  namespace: tinai-apps
spec:
  selector:
    app: coll
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coll
  namespace: tinai-apps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: coll.laruneng.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coll
                port:
                  number: 3000
