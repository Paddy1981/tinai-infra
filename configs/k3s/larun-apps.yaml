---
# Larun Space - Static site
apiVersion: apps/v1
kind: Deployment
metadata:
  name: larun-space
  namespace: tinai-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: larun-space
  template:
    metadata:
      labels:
        app: larun-space
    spec:
      nodeSelector:
        tinai.cloud/role: stateful
      containers:
        - name: larun-space
          image: docker.io/tinai/larun-space:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              hostPort: 3090
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: larun-space
  namespace: tinai-apps
spec:
  selector:
    app: larun-space
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: larun-space
  namespace: tinai-apps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: space.laruneng.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: larun-space
                port:
                  number: 80
    - host: larun.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: larun-space
                port:
                  number: 80
